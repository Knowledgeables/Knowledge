services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: knowledgeable
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace
      - ./data:/app/data
    environment:
      DB_PATH: /app/data/dev.db
      APP_ENV: dev

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npx tailwindcss@latest -i ./input.css -o ./output.css --watch"
    environment:
      - CHOKIDAR_USEPOLLING=true