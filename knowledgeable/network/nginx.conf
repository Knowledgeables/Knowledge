server {
    listen 80;
    server_name knowledgeable.one;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name knowledgeable.one;

    ssl_certificate /etc/letsencrypt/live/knowledgeable.one/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/knowledgeable.one/privkey.pem;

    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
