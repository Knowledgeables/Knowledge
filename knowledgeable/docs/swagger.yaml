basePath: /
definitions:
  auth.LoginResponse:
    properties:
      message:
        type: string
      status:
        type: string
    type: object
  users.RegisterRequest:
    properties:
      email:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for Knowledge service
  title: Knowledge API
  version: "1.0"
paths:
  /:
    get:
      description: Redirects the user depending on authentication state
      produces:
      - text/html
      responses:
        "303":
          description: Redirect to login or dashboard
          headers:
            Location:
              description: Redirect destination
              type: string
          schema:
            type: string
      summary: Serve Root Page
      tags:
      - pages
  /api/login:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Authenticate user and create session
      parameters:
      - description: Username
        in: formData
        name: username
        required: true
        type: string
      - description: Password
        in: formData
        name: password
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.LoginResponse'
        "400":
          description: missing credentials or bad form data
          schema:
            type: string
        "401":
          description: invalid credentials
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      summary: Login
      tags:
      - auth
  /api/register:
    post:
      consumes:
      - application/json
      description: Create a new user
      parameters:
      - description: Register user
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/users.RegisterRequest'
      produces:
      - application/json
      responses:
        "400":
          description: invalid request
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      summary: Register user
      tags:
      - auth
  /api/search:
    get:
      description: Search pages by query and optional language
      parameters:
      - description: Search query
        in: query
        name: q
        required: true
        type: string
      - description: Language code
        in: query
        name: language
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: object
            type: array
        "500":
          description: internal error
          schema:
            type: string
      summary: Search
      tags:
      - pages
  /login:
    get:
      description: Render login page
      produces:
      - text/html
      responses:
        "200":
          description: Login page
          schema:
            type: string
        "303":
          description: Redirect to dashboard
          schema:
            type: string
      summary: Serve Login page
      tags:
      - pages
  /logout:
    post:
      description: Deletes the current session and redirects to login page
      produces:
      - text/html
      responses:
        "303":
          description: Redirect to login page
          headers:
            Location:
              description: /login
              type: string
          schema:
            type: string
        "405":
          description: method not allowed
          schema:
            type: string
      summary: Logout user
      tags:
      - auth
  /register:
    get:
      description: Shows the register form
      produces:
      - text/html
      responses:
        "200":
          description: Register page
          schema:
            type: string
      summary: Server Register page
      tags:
      - pages
swagger: "2.0"
