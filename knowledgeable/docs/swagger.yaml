basePath: /
definitions:
  auth.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  auth.LoginResponse:
    properties:
      message:
        type: string
      status:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for Knowledge service
  title: Knowledge API
  version: "1.0"
paths:
  /api/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and create session
      parameters:
      - description: Login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.LoginResponse'
        "400":
          description: invalid json or missing credentials
          schema:
            type: string
        "401":
          description: invalid credentials
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      summary: Login user
      tags:
      - auth
  /api/search:
    get:
      description: Search pages by query and optional language
      parameters:
      - description: Search query
        in: query
        name: q
        required: true
        type: string
      - description: Language code
        in: query
        name: language
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: object
            type: array
        "500":
          description: internal error
          schema:
            type: string
      summary: Search pages
      tags:
      - pages
swagger: "2.0"
