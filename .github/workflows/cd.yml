name: CD - Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: production

    defaults:
      run:
        working-directory: knowledgeable

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests (safety gate)
        run: go test ./...

      - name: Build binary
        run: CGO_ENABLED=0 go build -o app ./cmd/server

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository }}/knowledgeable:latest \
            .

      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository }}/knowledgeable:latest