name: CD - Production

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run tests
        working-directory: knowledgeable
        run: go test ./...

      - name: Set up Docker Buildx
        run: |
          docker buildx create --use

      - name: Log in to GHCR
        run: echo "${{ secrets.CR__PAT }}" | docker login ghcr.io -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build and push all images
        working-directory: knowledgeable
        run: docker buildx bake -f docker-compose-build.yml --push

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add SSH key to runner
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/ssh_key
          chmod 600 ~/.ssh/ssh_key

      - name: Transfer docker-compose-prod.yml to server
        run: |
          scp -i ~/.ssh/ssh_key -o StrictHostKeyChecking=no \
            knowledgeable/docker-compose-prod.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/app/docker-compose.yml

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/ssh_key -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << "EOF"
            echo "${{ secrets.CR__PAT }}" | docker login ghcr.io -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            cd ~/app
            docker compose pull
            docker compose up -d
          EOF
